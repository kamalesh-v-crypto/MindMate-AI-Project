<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact - MindMate AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <aside class="sidebar">
            <h2 class="logo">MindMate AI</h2>
        </aside>

        <main class="chat-section" style="padding:50px;">
            <h1>📩 Contact Us</h1>

            <div class="card-box">
                <input type="text" placeholder="Your Name" class="input-style">
                <input type="email" placeholder="Your Email" class="input-style">
                <textarea placeholder="Your Message" class="input-style"></textarea>
                <button class="new-chat-btn">Send Message</button>
            </div>
        </main>

    </div>
</body>

</html>
