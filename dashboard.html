<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - MindMate AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔒 Login Protection -->
    <script>
        if (!localStorage.getItem("loggedInUser")) {
            window.location.href = "login.html";
        }
    </script>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div>
                <h2 class="logo">MindMate AI</h2>

                <p style="font-size:13px; opacity:0.7; margin-bottom:15px;">
                    Logged in as: <span id="userName"></span>
                </p>

                <button class="new-chat-btn" onclick="window.location.href='index.html'">
                    + Start Chat
                </button>

                <div class="chat-history">
                    <h4>Quick Access</h4>
                    <ul style="list-style:none; padding-left:0;">
                        <li style="margin:8px 0;">
                            <a href="profile.html" style="color:inherit; text-decoration:none;">Profile</a>
                        </li>
                        <li style="margin:8px 0;">
                            <a href="settings.html" style="color:inherit; text-decoration:none;">Settings</a>
                        </li>
                        <li style="margin:8px 0;">
                            <a href="about.html" style="color:inherit; text-decoration:none;">About</a>
                        </li>
                        <li style="margin:8px 0;">
                            <a href="contact.html" style="color:inherit; text-decoration:none;">Contact</a>
                        </li>
                        <li style="margin:8px 0;">
                            <a href="privacy.html" style="color:inherit; text-decoration:none;">Privacy Policy</a>
                        </li>
                    </ul>
                </div>
            </div>

            <button onclick="logout()" class="theme-toggle" style="background:#ef4444;">
                Logout
            </button>
        </aside>

        <!-- Main Section -->
        <main class="chat-section" style="padding:50px;">

            <h1 style="font-size:28px;">Welcome 👋</h1>
            <p style="margin-top:10px; opacity:0.8;">
                Hello <strong id="welcomeName"></strong>,
                Welcome back to MindMate AI.
            </p>

            <div style="margin-top:40px; display:flex; gap:20px; flex-wrap:wrap;">

                <div style="background:#1e293b; padding:20px; border-radius:12px; width:220px;">
                    <h3>💬 Start Chat</h3>
                    <p style="font-size:14px; opacity:0.7;">
                        Begin a new counselling session.
                    </p>
                    <button onclick="window.location.href='index.html'" style="margin-top:10px;" class="new-chat-btn">
                        Open Chat
                    </button>
                </div>

                <div style="background:#1e293b; padding:20px; border-radius:12px; width:220px;">
                    <h3>⚙ Settings</h3>
                    <p style="font-size:14px; opacity:0.7;">
                        Manage preferences and account.
                    </p>
                    <button onclick="window.location.href='settings.html'" style="margin-top:10px;"
                        class="new-chat-btn">
                        Open Settings
                    </button>
                </div>

                <div style="background:#1e293b; padding:20px; border-radius:12px; width:220px;">
                    <h3>👤 Profile</h3>
                    <p style="font-size:14px; opacity:0.7;">
                        View your account information.
                    </p>
                    <button onclick="window.location.href='profile.html'" style="margin-top:10px;" class="new-chat-btn">
                        View Profile
                    </button>
                </div>

            </div>

        </main>

    </div>

    <script>
        document.getElementById("userName").innerText =
            localStorage.getItem("loggedInUser");

        document.getElementById("welcomeName").innerText =
            localStorage.getItem("loggedInUser");
    </script>

    <script src="auth.js"></script>

</body>

</html>
