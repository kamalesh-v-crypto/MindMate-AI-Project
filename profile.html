<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile - MindMate AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <script>
        if (!localStorage.getItem("loggedInUser")) {
            window.location.href = "login.html";
        }
    </script>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="logo">MindMate AI</h2>

            <button class="new-chat-btn" style="margin-top:20px;" onclick="window.location.href='index.html'">
                + Start Chat
            </button>
        </aside>

        <!-- Main Section -->
        <main class="chat-section" style="padding:50px;">

            <h1>👤 Profile</h1>
            <p style="opacity:0.7; margin-top:5px;">
                Manage your account information
            </p>

            <div class="card-box" style="margin-top:30px;">
                <h3>Account Information</h3>

                <div style="margin-top:20px;">
                    <p><strong>Name:</strong> <span id="profileName"></span></p>
                    <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                    <p><strong>Status:</strong> Active User</p>
                </div>
            </div>

        </main>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("mindmate_user"));

        document.getElementById("profileName").innerText =
            user?.name || "User";

        document.getElementById("profileEmail").innerText =
            user?.email || "-";
    </script>

</body>

</html>
